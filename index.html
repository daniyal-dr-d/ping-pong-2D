<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Pong 2D - Global Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE SETUP ---
        let firebaseConfig, appId, auth, db, user;
        let isOffline = false;

        try {
            firebaseConfig = JSON.parse(__firebase_config);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'propong-global';
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            isOffline = true;
            console.log("Running in local mode.");
        }

        // --- GAME CONSTANTS ---
        const W = 800, H = 450, P_W = 10, P_H = 100, B_SIZE = 7;
        const P_SPEED = 8, WIN_SCORE = 10;
        
        let running = false, mode = 1, score1 = 0, score2 = 0;
        let role = null, roomId = null, connecting = false;

        const p1 = { x: 10, y: H/2-P_H/2, w: P_W, h: P_H, color: '#3b82f6' };
        const p2 = { x: W-20, y: H/2-P_H/2, w: P_W, h: P_H, color: '#ef4444' };
        const ball = { x: W/2, y: H/2, r: B_SIZE, vx: 5, vy: 5, speed: 5, color: '#facc15' };
        const keys = {};

        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');
        canvas.width = W; canvas.height = H;

        // --- AUTH ---
        if (!isOffline) {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
            onAuthStateChanged(auth, u => {
                user = u;
                if(u) {
                    document.getElementById('status').textContent = "SYSTEM ONLINE";
                    document.getElementById('btn-create').disabled = false;
                    document.getElementById('btn-create').style.opacity = "1";
                }
            });
        }

        // --- MULTIPLAYER LOGIC ---
        window.createRoom = async () => {
            if (isOffline || !user || connecting) return;
            connecting = true;
            const id = Math.random().toString(36).substring(2, 7).toUpperCase();
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', id);
            
            // Fast Transition: Move to game UI immediately
            roomId = id;
            role = 'p1';
            document.getElementById('room-input').value = id;
            document.getElementById('status').textContent = "CODE CREATED - WAITING...";
            
            await setDoc(ref, {
                p1Y: p1.y, p2Y: p2.y,
                ball: { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy },
                scores: { s1: 0, s2: 0 },
                status: 'waiting'
            });
            
            listen(id);
        };

        window.joinRoom = async () => {
            const id = document.getElementById('room-input').value.toUpperCase();
            if (isOffline || !id || connecting) return;
            connecting = true;
            document.getElementById('status').textContent = "CONNECTING...";
            
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', id);
            const snap = await getDoc(ref);
            if (snap.exists() && snap.data().status === 'waiting') {
                roomId = id;
                role = 'p2';
                await updateDoc(ref, { status: 'playing' });
                listen(id);
                start(3);
            } else {
                document.getElementById('status').textContent = "ROOM NOT FOUND";
                connecting = false;
            }
        };

        window.copyCode = () => {
            const input = document.getElementById('room-input');
            input.select();
            document.execCommand('copy');
            const status = document.getElementById('status');
            const oldText = status.textContent;
            status.textContent = "COPIED TO CLIPBOARD!";
            setTimeout(() => status.textContent = oldText, 2000);
        };

        function listen(id) {
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', id);
            onSnapshot(ref, (d) => {
                const data = d.data();
                if (!data) return;
                
                // Trigger game start immediately when P2 joins
                if (data.status === 'playing' && !running) {
                    start(3);
                }
                
                if (role === 'p2') {
                    p1.y = data.p1Y;
                    ball.x = data.ball.x; ball.y = data.ball.y;
                    score1 = data.scores.s1; score2 = data.scores.s2;
                } else {
                    p2.y = data.p2Y;
                }
                
                document.getElementById('s1').textContent = data.scores.s1;
                document.getElementById('s2').textContent = data.scores.s2;
            }, (err) => console.error("Sync error:", err));
        }

        async function sync() {
            if (isOffline || mode !== 3 || !roomId) return;
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', roomId);
            const up = {};
            if (role === 'p1') {
                up.p1Y = p1.y;
                up.ball = { x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy };
                up['scores.s1'] = score1; up['scores.s2'] = score2;
            } else {
                up.p2Y = p2.y;
            }
            await updateDoc(ref, up);
        }

        // --- CORE ENGINE ---
        window.start = (m) => {
            mode = m;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('multi-menu').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            running = true;
            resetBall();
            loop();
        };

        window.showMulti = () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('multi-menu').style.display = 'flex';
        };

        function resetBall() {
            ball.x = W/2; ball.y = H/2; ball.speed = 5;
            ball.vx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.vy = (Math.random() * 2 - 1) * ball.speed;
        }

        function update() {
            if (!running) return;
            // P1 movement
            if (role === 'p1' || mode !== 3) {
                if ((keys['KeyW'] || keys['ArrowUp']) && p1.y > 0) p1.y -= P_SPEED;
                if ((keys['KeyS'] || keys['ArrowDown']) && p1.y < H - p1.h) p1.y += P_SPEED;
            }
            // P2 movement
            if (mode === 2 || (mode === 3 && role === 'p2')) {
                if (keys['ArrowUp'] && p2.y > 0) p2.y -= P_SPEED;
                if (keys['ArrowDown'] && p2.y < H - p2.h) p2.y += P_SPEED;
            } else if (mode === 1) {
                p2.y += (ball.y - (p2.y + p2.h/2)) * 0.1;
            }

            // Physics (P1 handles ball in multiplayer to prevent desync)
            if (mode !== 3 || role === 'p1') {
                ball.x += ball.vx; ball.y += ball.vy;
                if (ball.y < 0 || ball.y > H) ball.vy *= -1;
                let pad = (ball.vx < 0) ? p1 : p2;
                if (ball.x > pad.x && ball.x < pad.x + pad.w && ball.y > pad.y && ball.y < pad.y + pad.h) {
                    ball.vx *= -1.05;
                }
                if (ball.x < 0) { score2++; resetBall(); }
                if (ball.x > W) { score1++; resetBall(); }
                document.getElementById('s1').textContent = score1;
                document.getElementById('s2').textContent = score2;
            }
            if (mode === 3) sync();
        }

        function draw() {
            ctx.fillStyle = '#020617'; ctx.fillRect(0,0,W,H);
            ctx.fillStyle = p1.color; ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
            ctx.fillStyle = p2.color; ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
            ctx.fillStyle = ball.color; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        }

        function loop() {
            if(!running) return;
            update(); draw(); requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
    </script>
    <style>
        body { margin: 0; background: #020617; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 4px solid #1e293b; background: #000; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; transition: all 0.2s; }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="menu" class="fixed inset-0 bg-slate-950 z-10 flex flex-col items-center justify-center p-4">
        <h1 class="text-6xl font-black italic mb-10 text-blue-500">PRO PONG</h1>
        <div class="w-64">
            <button onclick="start(1)" class="btn bg-blue-600 hover:bg-blue-500">Single Player</button>
            <button onclick="start(2)" class="btn bg-zinc-800 hover:bg-zinc-700">Local Versus</button>
            <button onclick="showMulti()" class="btn bg-emerald-600 hover:bg-emerald-500">Global Multiplayer</button>
        </div>
    </div>

    <div id="multi-menu" class="fixed inset-0 bg-slate-950 z-10 hidden flex flex-col items-center justify-center p-4">
        <div class="bg-zinc-900 p-8 rounded-2xl w-72 text-center border border-zinc-800 shadow-2xl">
            <button id="btn-create" disabled style="opacity: 0.5" onclick="createRoom()" class="btn bg-white text-black mb-4">Create Room</button>
            <div class="relative mb-4">
                <input id="room-input" type="text" placeholder="CODE" class="w-full bg-black border border-zinc-700 p-3 rounded-lg text-center font-mono text-xl uppercase text-emerald-400">
                <button onclick="copyCode()" class="absolute right-2 top-2 text-[10px] bg-zinc-800 px-2 py-1 rounded text-zinc-400 hover:text-white">COPY</button>
            </div>
            <button onclick="joinRoom()" class="btn bg-blue-600 hover:bg-blue-500">Join Room</button>
            <div id="status" class="text-[10px] text-blue-400 mt-2 font-mono uppercase tracking-widest">CONNECTING...</div>
        </div>
        <button onclick="location.reload()" class="mt-6 text-zinc-500 text-xs hover:text-white transition-colors">BACK TO MAIN MENU</button>
    </div>

    <div id="ui" class="hidden flex flex-col items-center">
        <div class="flex gap-12 mb-4 text-6xl font-mono font-black italic">
            <div id="s1" class="text-blue-500">0</div>
            <div class="text-zinc-800">/</div>
            <div id="s2" class="text-red-500">0</div>
        </div>
        <canvas id="pong"></canvas>
        <div class="mt-4 text-[10px] text-zinc-600 font-mono">FIRST TO 10 WINS</div>
    </div>
</body>
</html>
