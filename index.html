<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector Core: Pong</title>
    
    <!-- FIXED SECURE ABSOLUTE REMOTE PATH -->
    <script src="blockonomics.co"></script>

    <style>
        body { 
            margin: 0; 
            background: #070a13; 
            color: #f8fafc; 
            font-family: monospace; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            touch-action: none; 
            user-select: none; 
        }

        #launcher {
            position: fixed;
            inset: 0;
            background: #04060c;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-align: center;
            overflow-y: auto;
        }
        .launcher-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 0.25em;
            color: #38bdf8;
            margin: 0 0 4px 0;
        }
        .launcher-sub {
            font-size: 10px;
            color: #64748b;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin: 0 0 30px 0;
        }
        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 280px;
        }
        .menu-divider {
            font-size: 10px;
            color: #475569;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin: 10px 0 4px 0;
        }
        .launcher-btn {
            width: 100%;
            padding: 14px 0;
            background: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            border-radius: 12px;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .launcher-btn:hover { border-color: #38bdf8; }
        
        .btn-mode-select { border-color: #1e293b; color: #f8fafc; }
        .btn-mode-select:hover { border-color: #38bdf8; color: #38bdf8; }
        .btn-versus { border-color: #34d399; color: #6ee7b7; }
        
        .btn-bitcoin-pay {
            border-color: #f59e0b;
            color: #fcd34d;
            background: rgba(245, 158, 11, 0.05);
        }
        .btn-bitcoin-pay:hover {
            border-color: #fbbf24;
            background: rgba(245, 158, 11, 0.15);
        }

        .premium-status-badge {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid #a855f7;
            color: #d8b4fe;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 11px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        #blockonomics-msg-area {
            width: 100%;
            margin-top: 10px;
            font-size: 11px;
            color: #fbbf24;
            text-align: center;
        }

        .back-lnk, .reset-lnk {
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 8px;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .back-lnk:hover { color: #f43f5e; }
        .reset-lnk:hover { color: #38bdf8; }

        #loading-interstitial {
            position: fixed;
            inset: 0;
            background: #04060c;
            z-index: 60;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .interstitial-frame {
            border: 1px dashed #334155;
            background: #02040a;
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .ad-banner-placeholder {
            width: 100%;
            max-width: 468px;
            height: 60px;
            background: #0f172a;
            border: 1px solid #1e293b;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .countdown-text {
            font-size: 12px;
            color: #94a3b8;
            letter-spacing: 0.05em;
        }
        #timer-seconds {
            color: #f43f5e;
            font-weight: bold;
        }

        .arcade-frame { 
            border: 3px solid #334155; 
            background: #02040a; 
            border-radius: 16px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); 
            max-width: 98vw; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            align-items: center; 
        }
        
        .scoreboard { width: 100%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 12px; box-sizing: border-box; }
        .score-lbl { font-size: 10px; letter-spacing: 0.15em; color: #64748b; font-weight: bold; }
        .score-display { display: flex; gap: 32px; font-size: 32px; font-weight: 900; letter-spacing: 0.1em; }
        #p1-score { color: #38bdf8; }
        .score-divider { color: #334155; }
        #p2-score { color: #34d399; }
        .abort-btn { background: transparent; color: #f8fafc; font-family: monospace; font-size: 10px; border: 1px solid #1e293b; padding: 6px 12px; border-radius: 4px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
        .abort-btn:hover { border-color: #f43f5e; color: #f43f5e; }
        .workspace { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
        canvas { background: #010204; border: 1px solid #1e293b; border-radius: 8px; width: 100%; height: auto; aspect-ratio: 16 / 9; max-height: 55vh; max-width: 800px; object-fit: contain; }
        .control-deck { display: flex; flex-direction: column; gap: 16px; }
        @media (min-width: 768px) { .control-deck { display: none !important; } }
        .ctrl-btn { width: 70px; height: 70px; background: #0f172a; border: 2px solid #334155; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #94a3b8; transition: all 0.1s; -webkit-tap-highlight-color: transparent; cursor: pointer; }
        .ctrl-btn:active { background: #38bdf8; color: #02040a; border-color: #7dd3fc; transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- MAIN START INTERFACE -->
    <div id="launcher">
        <h1 class="launcher-title">VECTOR//CORE</h1>
        <p class="launcher-sub">Geometric Arcade Architecture</p>
        
        <div class="menu-group" id="group-modes">
            <div class="menu-divider">Select Mode</div>
            <button onclick="showDifficulties()" class="launcher-btn btn-mode-select">Solo Simulation</button>
            <button onclick="startAdSequence(2, null)" class="launcher-btn btn-versus">Dual Terminal</button>
            
            <div class="menu-divider">Crypto Node</div>
            <div id="market-placeholder">
                <button onclick="initializeRealBitcoinPayment()" class="launcher-btn btn-bitcoin-pay">Unlock Ad Free - $0.10 BTC</button>
            </div>
            <div id="reset-toggle-area" style="display: none;" onclick="cancelNoAdsPackage()" class="reset-lnk">Cancel No Ads Package</div>
            <div id="blockonomics-msg-area"></div>
        </div>

        <div class="menu-group" id="group-difficulties" style="display: none;">
            <div class="menu-divider">AI Difficulty</div>
            <button onclick="startAdSequence(1, 'easy')" class="launcher-btn">Beginner AI</button>
            <button onclick="startAdSequence(1, 'medium')" class="launcher-btn">Advanced AI</button>
            <button onclick="startAdSequence(1, 'hard')" class="launcher-btn">Expert AI</button>
            <div onclick="showModes()" class="back-lnk">« Back to Modes</div>
        </div>
    </div>

    <div id="loading-interstitial">
        <div class="interstitial-frame">
            <div class="ad-banner-placeholder">[ Sponsored Advertisement Space ]</div>
            <div class="countdown-text">Game initializes in <span id="timer-seconds">10</span> seconds.</div>
        </div>
    </div>

    <div id="dashboard" class="arcade-frame" style="display: none;">
        <div class="scoreboard">
            <span class="score-lbl" id="mode-display">MATCH NODE</span>
            <div class="score-display"><div id="p1-score">00</div><div class="score-divider">:</div><div id="p2-score">00</div></div>
            <button onclick="location.reload()" class="abort-btn">Abort</button>
        </div>
        <div class="workspace">
            <div id="left-deck" class="control-deck">
                <div class="ctrl-btn" ontouchstart="pressKey('KeyW')" ontouchend="releaseKey('KeyW')">↑</div>
                <div class="ctrl-btn" ontouchstart="pressKey('KeyS')" ontouchend="releaseKey('KeyS')">↓</div>
            </div>
            <canvas id="stage" width="800" height="450"></canvas>
            <div id="right-deck" class="control-deck">
                <div class="ctrl-btn" ontouchstart="pressKey('ArrowUp')" ontouchend="releaseKey('ArrowUp')">↑</div>
                <div class="ctrl-btn" ontouchstart="pressKey('ArrowDown')" ontouchend="releaseKey('ArrowDown')">↓</div>
            </div>
        </div>
    </div>

    <script>
        let isAdFreePackageOwned = localStorage.getItem('vectorCore_noAds') === 'true';

        window.onload = function() {
            checkPremiumStatus();
        };

        function checkPremiumStatus() {
            const marketArea = document.getElementById('market-placeholder');
            const resetArea = document.getElementById('reset-toggle-area');
            
            if (isAdFreePackageOwned) {
                marketArea.innerHTML = `<div class="premium-status-badge">[ Ad Free Mode Active ]</div>`;
                resetArea.style.display = 'block';
                document.getElementById('blockonomics-msg-area').style.display = 'none';
            } else {
                marketArea.innerHTML = `<button onclick="initializeRealBitcoinPayment()" class="launcher-btn btn-bitcoin-pay">Unlock Ad Free - $0.10 BTC</button>`;
                resetArea.style.display = 'none';
                document.getElementById('blockonomics-msg-area').style.display = 'block';
            }
        }

        function cancelNoAdsPackage() {
            if (confirm("Deactivate Ad Free Package? This will turn the 10-second countdown screen back on.")) {
                isAdFreePackageOwned = false;
                localStorage.removeItem('vectorCore_noAds');
                checkPremiumStatus();
                alert("Package Cancelled. System reverted back to Standard Ad-Supported Edition.");
            }
        }

        function initializeRealBitcoinPayment() {
            if (typeof Blockonomics === 'undefined') {
                alert("Payment framework offline. To fix:\n1. Ensure you have internet connection.\n2. Run this file from a live web server hosting node, not as a local raw file path.");
                return;
            }

            Blockonomics.widget({
                msg_area: 'blockonomics-msg-area',
                uid: 'YOUR_BLOCKONOMICS_BUTTON_UID',
                amount: 0.10,
                onPayment: function() {
                    isAdFreePackageOwned = true;
                    localStorage.setItem('vectorCore_noAds', 'true');
                    checkPremiumStatus();
                    alert("Real Bitcoin Transaction Detected! Interstitial Ads Definitively Removed.");
                }
            });
        }

        const canvas = document.getElementById('stage'); const ctx = canvas.getContext('2d');
        let isOperational = false, sessionMode = 1, tally1 = 0, tally2 = 0; const registry = {};
        let queuedMode = 1; let queuedDifficulty = null;
        function showDifficulties() { document.getElementById('group-modes').style.display = 'none'; document.getElementById('group-difficulties').style.display = 'flex'; }
        function showModes() { document.getElementById('group-difficulties').style.display = 'none'; document.getElementById('group-modes').style.display = 'flex'; }
        
        function startAdSequence(mode, difficulty) {
            queuedMode = mode; queuedDifficulty = difficulty;
            document.getElementById('launcher').style.display = 'none';
            if (isAdFreePackageOwned) { bootSystem(queuedMode, queuedDifficulty); return; }
            document.getElementById('loading-interstitial').style.display = 'flex';
            let timeRemaining = 10; document.getElementById('timer-seconds').textContent = timeRemaining;
            const countdownInterval = setInterval(() => {
                timeRemaining--; document.getElementById('timer-seconds').textContent = timeRemaining;
                if (timeRemaining <= 0) { clearInterval(countdownInterval); document.getElementById('loading-interstitial').style.display = 'none'; bootSystem(queuedMode, queuedDifficulty); }
            }, 1000);
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, duration, type = 'square') {
            try { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration); } catch (e) {}
        }

        const nodeA = { x: 20, y: 175, width: 6, height: 100, speed: 11, color: '#38bdf8' };
        const nodeB = { x: 774, y: 175, width: 6, height: 100, speed: 6, color: '#34d399', trackingLag: 0.05 };
        const vector = { x: 400, y: 225, radius: 5, xVel: 0, yVel: 0, baseRate: 10.5, rate: 10.5, color: '#f8fafc' };

        function bootSystem(mode, aiDifficulty) {
            sessionMode = mode; if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('dashboard').style.display = 'flex'; document.getElementById('left-deck').style.display = 'flex';
            if (sessionMode === 2) { document.getElementById('right-deck').style.display = 'flex'; document.getElementById('mode-display').textContent = "LOCAL VERSUS"; nodeB.speed = 11; }
            else {
                document.getElementById('right-deck').style.display = 'none';
                if (aiDifficulty === 'easy') { nodeB.speed = 4.5; nodeB.trackingLag = 0.05; document.getElementById('mode-display').textContent = "AI: BEGINNER"; }
                else if (aiDifficulty === 'medium') { nodeB.speed = 6.5; nodeB.trackingLag = 0.08; document.getElementById('mode-display').textContent = "AI: ADVANCED"; }
                else if (aiDifficulty === 'hard') { nodeB.speed = 9.0; nodeB.trackingLag = 0.14; document.getElementById('mode-display').textContent = "AI: EXPERT"; }
            }
            isOperational = true; generateVector(); processLoop();
        }
        function generateVector() { vector.x = canvas.width / 2; vector.y = canvas.height / 2; vector.rate = vector.baseRate; const direction = Math.random() > 0.5 ? 1 : -1; const spreadAngle = (Math.random() * 40 - 20) * Math.PI / 180; vector.xVel = direction * vector.rate * Math.cos(spreadAngle); vector.yVel = vector.rate * Math.sin(spreadAngle); }
        function pressKey(code) { registry[code] = true; } function releaseKey(code) { registry[code] = false; }

        function evaluateTicks() {
            if (!isOperational) return;
            if (registry['KeyW'] && nodeA.y > 10) nodeA.y -= nodeA.speed; if (registry['KeyS'] && nodeA.y < canvas.height - nodeA.height - 10) nodeA.y += nodeA.speed;
            if (sessionMode === 2) { if (registry['ArrowUp'] && nodeB.y > 10) nodeB.y -= nodeB.speed; if (registry['ArrowDown'] && nodeB.y < canvas.height - nodeB.height - 10) nodeB.y += nodeB.speed; }
            else { let targetY = vector.y - nodeB.height / 2; let moveAmount = (targetY - nodeB.y) * nodeB.trackingLag; if (Math.abs(moveAmount) > nodeB.speed) moveAmount = Math.sign(moveAmount) * nodeB.speed; nodeB.y += moveAmount; }
            vector.x += vector.xVel; vector.y += vector.yVel;
            if (vector.y - vector.radius < 0 || vector.y + vector.radius > canvas.height) { vector.yVel *= -1; playTone(220, 0.08, 'sine'); }
            let currentBlock = (vector.xVel < 0) ? nodeA : nodeB;
            if (vector.x + vector.radius > currentBlock.x && vector.x - vector.radius < currentBlock.x + currentBlock.width) { if (vector.y + vector.radius > currentBlock.y && vector.y - vector.radius < currentBlock.y + currentBlock.height) { vector.rate = Math.min(vector.rate * 1.12, 32); const reflectionOffset = (currentBlock.y + (currentBlock.height / 2)) - vector.y; const scaleFactor = reflectionOffset / (currentBlock.height / 2); const deflectionAngle = scaleFactor * (Math.PI / 3.5); const orientation = (vector.xVel < 0) ? 1 : -1; vector.xVel = orientation * vector.rate * Math.cos(deflectionAngle); vector.yVel = vector.rate * -Math.sin(deflectionAngle); playTone(440, 0.1, 'square'); } }
            if (vector.x < 0) { tally2++; document.getElementById('p2-score').textContent = tally2.toString().padStart(2, '0'); playTone(150, 0.4, 'sawtooth'); verifyMatchState(); }
            else if (vector.x > canvas.width) { tally1++; document.getElementById('p1-score').textContent = tally1.toString().padStart(2, '0'); playTone(150, 0.4, 'sawtooth'); verifyMatchState(); }
        }
        function verifyMatchState() { if (tally1 >= 10 || tally2 >= 10) { isOperational = false; setTimeout(() => { alert(tally1 >= 10 ? "BLUE TERMINAL VICTORIOUS" : "GREEN TERMINAL VICTORIOUS"); location.reload(); }, 50); } else { generateVector(); } }
        function drawFrame() { ctx.fillStyle = '#020409'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height); ctx.stroke(); ctx.fillStyle = nodeA.color; ctx.fillRect(nodeA.x, nodeA.y, nodeA.width, nodeA.height); ctx.fillStyle = nodeB.color; ctx.fillRect(nodeB.x, nodeB.y, nodeB.width, nodeB.height); ctx.fillStyle = vector.color; ctx.beginPath(); ctx.arc(vector.x, vector.y, vector.radius, 0, Math.PI * 2); ctx.fill(); }
        function processLoop() { if (!isOperational) return; evaluateTicks(); drawFrame(); requestAnimationFrame(processLoop); }
        window.addEventListener('keydown', e => pressKey(e.code)); window.addEventListener('keyup', e => releaseKey(e.code));
        document.addEventListener('touchstart', (e) => { if (e.target.className.includes('ctrl-btn')) e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
