<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Pulse 2D</title>
    
    <script src="tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #05050a; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; touch-action: none; }
        canvas { border: 2px solid #06b6d4; background: #010103; border-radius: 12px; box-shadow: 0 0 30px rgba(6, 182, 212, 0.15); max-width: 95vw; max-height: 70vh; object-fit: contain; }
        .neon-btn { width: 100%; padding: 14px; border-radius: 6px; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s; border: 1px solid transparent; }
        .neon-btn:active { transform: scale(0.97); }
        .touch-pad { width: 75px; height: 75px; background: rgba(6, 182, 212, 0.05); border: 1px solid rgba(6, 182, 212, 0.3); border-radius: 8px; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; font-size: 28px; }
        .touch-pad:active { background: rgba(236, 72, 153, 0.2); border-color: #ec4899; color: #ec4899; }
    </style>
</head>
<body>

    <!-- Main Menu -->
    <div id="menu-screen" class="fixed inset-0 bg-[#030307] z-10 flex flex-col items-center justify-center p-6">
        <h1 class="text-4xl md:text-6xl font-black tracking-widest mb-2 text-cyan-400 drop-shadow-[0_0_10px_rgba(6,182,212,0.6)]">NEON PULSE</h1>
        <p class="text-xs text-pink-500 font-bold tracking-[0.3em] uppercase mb-12">Grid Protocol Edition</p>
        
        <div class="w-64">
            <button onclick="launchGame(1)" class="neon-btn bg-transparent border-cyan-500 text-cyan-400 hover:bg-cyan-950/40">Solo Node</button>
            <button onclick="launchGame(2)" class="neon-btn bg-transparent border-pink-500 text-pink-400 hover:bg-pink-950/40">Dual Link</button>
        </div>
    </div>

    <!-- Game UI Container -->
    <div id="game-stage" class="hidden flex flex-col items-center w-full h-full justify-center p-2">
        <!-- SCORE OVERLAY -->
        <div class="flex gap-20 mb-4 text-4xl md:text-5xl font-bold tracking-widest">
            <div id="score-p1" class="text-cyan-400 drop-shadow-[0_0_8px_rgba(6,182,212,0.5)]">00</div>
            <div id="score-p2" class="text-pink-500 drop-shadow-[0_0_8px_rgba(236,72,153,0.5)]">00</div>
        </div>
        
        <div class="relative flex items-center justify-center w-full">
            <!-- Left Side Control Cluster -->
            <div id="ctrl-left" class="absolute left-2 md:hidden flex flex-col gap-6 z-20">
                <div class="touch-pad" ontouchstart="inputs['KeyW']=true" ontouchend="inputs['KeyW']=false">▲</div>
                <div class="touch-pad" ontouchstart="inputs['KeyS']=true" ontouchend="inputs['KeyS']=false">▼</div>
            </div>

            <canvas id="arena"></canvas>

            <!-- Right Side Control Cluster -->
            <div id="ctrl-right" class="absolute right-2 md:hidden flex flex-col gap-6 z-20">
                <div class="touch-pad" ontouchstart="inputs['ArrowUp']=true" ontouchend="inputs['ArrowUp']=false">▲</div>
                <div class="touch-pad" ontouchstart="inputs['ArrowDown']=true" ontouchend="inputs['ArrowDown']=false">▼</div>
            </div>
        </div>

        <button onclick="location.reload()" class="mt-8 text-zinc-600 hover:text-pink-400 text-xs tracking-widest transition-colors font-bold uppercase">Disconnect Node</button>
    </div>

    <script>
        const canvas = document.getElementById('arena');
        const ctx = canvas.getContext('2d');
        
        canvas.width = 850;
        canvas.height = 480;

        let isActive = false, gameMode = 1, ptsP1 = 0, ptsP2 = 0;
        let trail = [];

        const leftPaddle = { x: 15, y: 190, w: 8, h: 90, color: '#06b6d4' };
        const rightPaddle = { x: 827, y: 190, w: 8, h: 90, color: '#ec4899' };
        const core = { x: 425, y: 240, size: 6, dx: 6, dy: 3, velocity: 6, color: '#fff' };
        const inputs = {};

        function launchGame(selectedMode) {
            gameMode = selectedMode;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-stage').style.display = 'flex';
            
            if (gameMode === 2) {
                document.getElementById('ctrl-right').classList.remove('hidden');
            } else {
                document.getElementById('ctrl-right').classList.add('hidden');
            }

            isActive = true;
            resetCore();
            engine();
        }

        function resetCore() {
            core.x = canvas.width / 2;
            core.y = canvas.height / 2;
            core.velocity = 6;
            trail = [];
            
            let angle = (Math.random() * 60 - 30) * Math.PI / 180;
            let direction = Math.random() > 0.5 ? 1 : -1;
            
            core.dx = direction * core.velocity * Math.cos(angle);
            core.dy = core.velocity * Math.sin(angle);
        }

        function step() {
            if (!isActive) return;
            
            if (inputs['KeyW'] && leftPaddle.y > 10) leftPaddle.y -= 9;
            if (inputs['KeyS'] && leftPaddle.y < canvas.height - leftPaddle.h - 10) leftPaddle.y += 9;

            if (gameMode === 2) {
                if (inputs['ArrowUp'] && rightPaddle.y > 10) rightPaddle.y -= 9;
                if (inputs['ArrowDown'] && rightPaddle.y < canvas.height - rightPaddle.h - 10) rightPaddle.y += 9;
            } else {
                let easeFactor = 0.085;
                let aiDestination = core.y - rightPaddle.h / 2;
                rightPaddle.y += (aiDestination - rightPaddle.y) * easeFactor;
            }

            core.x += core.dx; 
            core.y += core.dy;

            trail.push({ x: core.x, y: core.y });
            if (trail.length > 10) trail.shift();

            if (core.y - core.size < 0 || core.y + core.size > canvas.height) {
                core.dy *= -1;
                core.y = core.y < 0 ? core.size : canvas.height - core.size;
            }

            let currentTarget = (core.x < canvas.width / 2) ? leftPaddle : rightPaddle;
            
            if (core.x + core.size > currentTarget.x && core.x - core.size < currentTarget.x + currentTarget.w) {
                if (core.y + core.size > currentTarget.y && core.y - core.size < currentTarget.y + currentTarget.h) {
                    
                    core.velocity = Math.min(core.velocity * 1.04, 16);
                    let relativeIntersectY = (currentTarget.y + (currentTarget.h / 2)) - core.y;
                    let normalizedIntersectY = relativeIntersectY / (currentTarget.h / 2);
                    let bounceAngle = normalizedIntersectY * (Math.PI / 3);
                    
                    let dirX = (core.x < canvas.width / 2) ? 1 : -1;
                    core.dx = dirX * core.velocity * Math.cos(bounceAngle);
                    core.dy = core.velocity * -Math.sin(bounceAngle);
                }
            }

            if (core.x < 0) {
                ptsP2++;
                document.getElementById('score-p2').textContent = ptsP2.toString().padStart(2, '0');
                evaluateMatch();
            } else if (core.x > canvas.width) {
                ptsP1++;
                document.getElementById('score-p1').textContent = ptsP1.toString().padStart(2, '0');
                evaluateMatch();
            }
        }

        function evaluateMatch() {
            if (ptsP1 >= 10 || ptsP2 >= 10) {
                isActive = false;
                setTimeout(() => {
                    alert(ptsP1 >= 10 ? "CYAN NODE DOMINATES" : "PINK NODE DOMINATES");
                    location.reload();
                }, 60);
            } else {
                resetCore();
            }
        }

        function render() {
            ctx.fillStyle = '#030307'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#0a0a16';
            ctx.lineWidth = 1;
            for(let i = 40; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j = 40; j < canvas.height; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            ctx.strokeStyle = 'rgba(6, 182, 212, 0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();

            for (let i = 0; i < trail.length; i++) {
                let opacity = (i + 1) / trail.length * 0.25;
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.beginPath();
                ctx.arc(trail[i].x, trail[i].y, core.size * 0.8, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = leftPaddle.color;
            ctx.fillRect(leftPaddle.x, leftPaddle.y, leftPaddle.w, leftPaddle.h);
            
            ctx.fillStyle = rightPaddle.color;
            ctx.fillRect(rightPaddle.x, rightPaddle.y, rightPaddle.w, rightPaddle.h);

            ctx.fillStyle = core.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fff';
            ctx.beginPath();
            ctx.arc(core.x, core.y, core.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function engine() {
            if (!isActive) return;
            step();
            render();
            requestAnimationFrame(engine);
        }

        window.addEventListener('keydown', e => inputs[e.code] = true);
        window.addEventListener('keyup', e => inputs[e.code] = false);

        document.addEventListener('touchstart', (e) => {
            if (e.target.className.includes('touch-pad')) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
